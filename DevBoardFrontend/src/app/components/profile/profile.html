<div class="profile-wrapper">

  <div class="profile-card">

    <!-- Header -->
    <div class="profile-header">
      <div>
        <h2>{{ profileForm.value.firstName }} {{ profileForm.value.secondName }}</h2>
        <p class="username">@{{ profileForm.value.userName }}</p>
      </div>

      <button *ngIf="!isEditMode" class="btn-edit" (click)="enableEdit()">
        Edit
      </button>
    </div>

    <!-- VIEW MODE -->
    <div *ngIf="!isEditMode" class="profile-info">

      <div class="info-row">
        <span>Email</span>
        <p>{{ profileForm.value.email }}</p>
      </div>

      <div class="info-row">
        <span>Role</span>
        <p>{{ profileForm.value.roles }}</p>
      </div>

    </div>

    <!-- EDIT MODE -->
    <form *ngIf="isEditMode" [formGroup]="profileForm" class="edit-form">

      <div class="form-grid">
        <input type="text" formControlName="firstName" placeholder="First Name">
        <input type="text" formControlName="secondName" placeholder="Last Name">
        <input type="email" formControlName="email" placeholder="Email">
        <input type="text" formControlName="userName" placeholder="Username">

        <select formControlName="roles">
          <option value="USER">User</option>
          <option value="ADMIN">Admin</option>
        </select>

        <input type="password" formControlName="password" placeholder="New Password">
        <input type="password" formControlName="confirmPassword" placeholder="Confirm Password">
      </div>

      <div class="actions">
        <button class="btn-save" (click)="saveProfile()">Save</button>
        <button class="btn-cancel" type="button" (click)="cancelEdit()">Cancel</button>
      </div>

    </form>

  </div>

</div>
