<div class="user-list-container">
  <div class="list-header">
    <h2>User Directory</h2>

    <div class="action-buttons">
      <button 
        class="edit-btn" 
        [disabled]="!selectedUser"
        (click)="onEdit()">
        Edit
      </button>

      <button 
        class="delete-btn" 
        [disabled]="!selectedUser || !isAuthorized"
        (click)="onDelete()">
        Delete
      </button>
    </div>
  </div>

  <div class="search-wrapper">
    <input 
      type="text" 
      class="search-input"
      placeholder="Search users by name..."
      [(ngModel)]="searchText"
    />
  </div>

  <ul class="user-list">
    <li 
      *ngFor="let user of users | search:searchText"
      class="user-item"
      [class.selected]="selectedUser?.id === user.id"
      (click)="selectUser(user)"
    >
      <div class="user-info">
        <span class="user-name">{{ user.name | capitalize }}</span>
      </div>
    </li>
  </ul>
</div>
