<div class="login-page">
  <div class="login-card">
    <h2>Welcome Back</h2>
    <p class="subtitle">Please enter your details to sign in</p>

    <form (ngSubmit)="loginUser()" #loginForm="ngForm">
      <div class="form-group">
        <label>Username</label>
        <input type="text" name="username" [(ngModel)]="loginData.username" required placeholder="Enter your username">
      </div>

      <div class="form-group">
        <label>Password</label>
        <div class="password-wrapper">
          <input 
            [name]="'password'" 
            [type]="showPassword ? 'text' : 'password'" 
            [(ngModel)]="loginData.password" 
            required
            placeholder="••••••••">
          <button class="password-visibility" type="button" (click)="togglePassword()">
            {{ showPassword ? 'Hide' : 'Show' }}
          </button>
        </div>
      </div>

      <div class="error-box" *ngIf="errorMessage">
        <i class="error-icon">!</i> {{errorMessage}}
      </div>

      <button type="submit" class="login-btn" [disabled]="!loginForm.form.valid">
        Login
      </button>
      
      <p class="forgot-password">Forgot password?</p>
    </form>
  </div>
</div>
